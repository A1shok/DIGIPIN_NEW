<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shipping Address Verification</title>
    <style>
      body {
        align-items: center;
        background: #f1f5f9;
        color: #0f172a;
        display: flex;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 32px 16px;
      }

      .checkout-container {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        box-shadow: 0 12px 34px rgba(15, 23, 42, .08);
        display: grid;
        gap: 24px;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
        max-width: 1100px;
        padding: 28px;
        width: 100%;
      }

      .shipping-form {
        min-width: 0;
      }

      h1 {
        border-bottom: 1px solid #e2e8f0;
        font-size: 24px;
        line-height: 1.2;
        margin: 0 0 22px;
        padding-bottom: 12px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        color: #334155;
        display: block;
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      input {
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        box-sizing: border-box;
        color: #0f172a;
        font: 500 15px/1.3 inherit;
        min-height: 44px;
        padding: 10px 12px;
        width: 100%;
      }

      input[readonly] {
        background: #f8fafc;
        color: #475569;
      }

      gridflow-checkout {
        display: block;
        min-width: 0;
      }

      @media (max-width: 820px) {
        body {
          align-items: flex-start;
        }

        .checkout-container {
          grid-template-columns: 1fr;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="checkout-container">
      <section class="shipping-form">
        <h1>Shipping Information</h1>

        <div class="form-group">
          <label for="customer_name">Customer Name</label>
          <input type="text" id="customer_name" value="Rahul Sharma">
        </div>

        <div class="form-group">
          <label for="address1">Address Line 1</label>
          <input type="text" id="address1" value="3-113, Gundimeda, Tadepalli Mandal, Guntur District, Andhra Pradesh">
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="shipping_address[city]" value="Guntur">
        </div>

        <div class="form-group">
          <label for="state">State</label>
          <input type="text" id="state" name="shipping_address[province]" value="Andhra Pradesh">
        </div>

        <div class="form-group">
          <label for="pincode">PIN Code</label>
          <input type="text" id="pincode" name="shipping_address[zip]" value="522303" maxlength="6" inputmode="numeric">
        </div>

        <div class="form-group">
          <label for="shipping_address_address2">Address Line 2 / GridFlow Metadata</label>
          <input type="text" id="shipping_address_address2" placeholder="DIGIPIN metadata appears here" readonly>
        </div>
      </section>

      <gridflow-checkout pincode-src="./pincode-centroids.json"></gridflow-checkout>
    </main>

    <script src="./gridflow-core.js"></script>
    <script src="./gridflow-checkout.js"></script>
  </body>
</html>
