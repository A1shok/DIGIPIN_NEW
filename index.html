<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GridFlow Checkout Demo Environment</title>
    <style>
      body { margin: 0; background: #f3f6f8; font-family: system-ui, sans-serif; padding: 40px; }
      main { max-width: 500px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; border: 1px solid #cbd5e1; }
      label { display: block; margin: 12px 0 4px; font-weight: bold; font-size: 14px; color: #334155; }
      input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; margin-bottom: 8px; font-size: 14px; }
    </style>
  </head>
  <body>
    <main>
      <h2 style="margin-top:0; color:#1e293b; border-bottom:1px solid #e2e8f0; padding-bottom:8px;">Shipping Information</h2>
      
      <label>Customer Name</label>
      <input id="name" value="Rahul Sharma">
      
      <label>Address Line 1</label>
      <input id="address1" value="Flat 302, Green Meadows Apartment">
      
      <label>PIN Code (Enables Smart Verification)</label>
      <input id="pincode" value="110001" placeholder="e.g., 110001">
      
      <label>Address Line 2 (GridFlow Injects Metadata Here)</label>
      <input id="checkout_shipping_address_address2" readonly placeholder="Calculates dynamically..." style="background:#f8fafc; font-weight:500; color:#0f766e;">
      
      <div style="margin-top: 24px;">
        <gridflow-checkout target="#checkout_shipping_address_address2"></gridflow-checkout>
      </div>
    </main>

    <script src="./gridflow-core.js"></script>
    <script src="./gridflow-checkout.js"></script>
  </body>
</html>
