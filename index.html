<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GridFlow DIGIPIN Checkout Demo</title>
    <style>
      body{margin:0;background:#f3f6f8;color:#17202a;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      main{width:min(980px,calc(100vw - 32px));margin:40px auto;display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,420px);gap:24px;align-items:start}
      section{background:#fff;border:1px solid #d7dde5;border-radius:8px;padding:20px}
      label{display:block;font-weight:700;margin:14px 0 6px}
      input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font:inherit;box-sizing:border-box}
      textarea{min-height:96px}
      
      /* BUG FIX 3: Educational contextual notification widget */
      .gf-onboarding-banner { background: #eef5f2; border: 1px solid #c9ddd5; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13.5px; color: #116149; font-weight: 500; display: flex; gap: 8px; align-items: center; line-height: 1.4; }
      
      @media(max-width:760px){main{grid-template-columns:1fr;margin-top:20px}}
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Checkout Shipping</h1>
        
        <div class="gf-onboarding-banner">
          <span>📍</span>
          <span><strong>Rooftop Locking Enabled:</strong> Click the secure premium button on your right to sync your 4-meter delivery coordinates and eliminate driver phone calls completely.</span>
        </div>

        <label for="name">Customer name</label>
        <input id="name" value="Test Customer">
        <label for="address1">Address line 1</label>
        <input id="address1" value="Dak Bhawan">
        <label for="checkout_shipping_address_address2">Address line 2 / Landmark (GridFlow metadata appends here)</label>
        <input id="checkout_shipping_address_address2" value="">
        <label for="city">City</label>
        <input id="city" value="New Delhi">
        <label for="state">State</label>
        <input id="state" value="Delhi">
        <label for="pincode">PIN code</label>
        <input id="pincode" value="110001">
      </section>

      <aside>
        <gridflow-checkout target="#checkout_shipping_address_address2" pincode-src="./pincode-centroids.json"></gridflow-checkout>
      </aside>
    </main>

    <script src="./gridflow-core.js"></script>
    <script src="./gridflow-checkout.js"></script>
    <script>
      document.addEventListener('gridflow:resolved', function (ev) {
        console.log('GridFlow Match Captured:', ev.detail.digipin, 'Target Injection Element:', ev.detail.target);
      });
    </script>
  </body>
</html>
