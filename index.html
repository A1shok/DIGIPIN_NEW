<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GridFlow DIGIPIN Checkout Demo</title>
    <style>
      body{margin:0;background:#f3f6f8;color:#17202a;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      main{width:min(980px,calc(100vw - 32px));margin:40px auto;display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,420px);gap:24px;align-items:start}
      section{background:#fff;border:1px solid #d7dde5;border-radius:8px;padding:20px}
      label{display:block;font-weight:700;margin:14px 0 6px}
      input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font:inherit;box-sizing:border-box}
      textarea{min-height:96px}
      @media(max-width:760px){main{grid-template-columns:1fr;margin-top:20px}}
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Checkout Shipping</h1>
        <label for="name">Customer name</label>
        <input id="name" value="Test Customer">
        <label for="address1">Address line 1</label>
        <input id="address1" value="Dak Bhawan">
        <label for="checkout_shipping_address_address2">Address line 2</label>
        <textarea id="checkout_shipping_address_address2" name="checkout[shipping_address][address2]"></textarea>
        <label for="note">Shipping notes</label>
        <textarea id="note" name="note"></textarea>
      </section>
      <gridflow-checkout pincode-src="./pincode-centroids.json"></gridflow-checkout>
    </main>
    <script src="./gridflow-core.js"></script>
    <script src="./gridflow-checkout.js"></script>
  </body>
</html>
